version: '3.9'

services:
  postgresql:
    image: postgres:18
    container_name: postgresql-iai
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: iai_sistemapermisos
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: postgresql
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: example
      DB_NAME: iai_sistemapermisos
      JWT_SECRET: 586E3272357538782F413F4428472B4B6250655368566B597033733676397924
      URL_FRONTEND: http://192.168.0.179
      EMAIL_ADDRESS: correo@gmail.com
      EMAIL_PERMISOS: correo+permisos@gmail.com
      EMAIL_DIRECTOR: correo+director@gmail.com
      EMAIL_SOPORTE: correo+soporte@gmail.com
      EMAIL_PASSWORD: sgvxdfhzsvnjrmzj
      IMAP_HOST: imap.gmail.com
      IMAP_PORT: 993
      IMAP_SECURE: "true"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:3000/api"
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend