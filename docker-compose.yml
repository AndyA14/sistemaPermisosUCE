version: '3.9'

services:
  postgresql:
    image: postgres:18
    container_name: postgresql-iai
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: iai_sistemapermisos
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgresql:
        condition: service_healthy
    # INYECCIÓN DIRECTA DE VARIABLES:
    env_file:
      - ./backend/.env
    # Sobreescribimos solo lo necesario para la red de Docker
    environment:
      DB_HOST: postgresql

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "http://localhost:3000/api"
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    # INYECCIÓN PARA EL FRONTEND:
    env_file:
      - ./frontend/.env